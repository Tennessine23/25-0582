<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEXUS — Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black:#0a0a0a; --charcoal:#1a1a1a; --graphite:#2e2e2e;
      --silver:#8a8a8a; --platinum:#c8c8c8; --white:#f5f2ee;
      --gold:#c9a84c;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;line-height:1.7;}
    a{text-decoration:none;color:inherit;}
    .container{max-width:1280px;margin:0 auto;padding:0 40px;}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);}

    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:22px 48px;background:rgba(10,10,10,.95);border-bottom:1px solid rgba(201,168,76,.15);}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;letter-spacing:.25em;}
    .nav-logo span{color:var(--gold);}
    .nav-links{display:flex;list-style:none;gap:40px;}
    .nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;color:var(--platinum);}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:2px;}

    header{padding:160px 0 80px;text-align:center;}
    header p{max-width:70ch;margin:18px auto 0;color:var(--platinum);}

    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding-bottom:100px;}
    .gallery-grid img{width:100%;height:260px;object-fit:cover;filter:brightness(.75);transition:.5s;border:1px solid rgba(201,168,76,.12);}
    .gallery-grid img:hover{filter:brightness(.5);transform:scale(1.03);}

    footer{background:var(--charcoal);border-top:1px solid rgba(201,168,76,.15);padding:60px 0 25px;}
    .footer-bottom{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.06);padding-top:20px;margin-top:40px;}
    .footer-bottom p{color:var(--silver);font-size:.8rem;}

    @media(max-width:900px){
      .gallery-grid{grid-template-columns:1fr;}
      nav{padding:18px 24px;}
      .nav-links{gap:18px;}
    }
  </style>
</head>

<body>

<nav>
  <div class="nav-logo">LEX<span>U</span>S</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="lexus-models.html">Models</a></li>
    <li><a href="lexus-gallery.html" class="active">Gallery</a></li>
    <li><a href="lexus-contact.html">Contact</a></li>
  </ul>
</nav>

<header class="container">
  <h1>Lexus <span style="color:var(--gold);">Gallery</span></h1>
  <p>
    A visual collection of Lexus design — from bold performance lines to timeless luxury interiors.
  </p>
</header>

<section class="container">
  <div class="gallery-grid">
    <img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?w=800&q=80" alt="Gallery 1">
    <img src="https://images.unsplash.com/photo-1580274455191-1c62238fa333?w=800&q=80" alt="Gallery 2">
    <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800&q=80" alt="Gallery 3">
    <img src="https://images.unsplash.com/photo-1625047509248-ec889cbff17f?w=800&q=80" alt="Gallery 4">
    <img src="https://images.unsplash.com/photo-1617469767053-d3b523a0b982?w=800&q=80" alt="Gallery 5">
    <img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6f7?w=800&q=80" alt="Gallery 6">
    <img src="https://images.unsplash.com/photo-1605559424843-9e66a6e79fba?w=800&q=80" alt="Gallery 7">
    <img src="https://images.unsplash.com/photo-1614200179396-2bdbf2d56f86?w=800&q=80" alt="Gallery 8">
    <img src="https://images.unsplash.com/photo-1607071472041-9b3bfb8b1e0c?w=800&q=80" alt="Gallery 9">
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <p>© 2026 Lexus — All Rights Reserved.</p>
      <p style="color:var(--gold);">The Pursuit of Perfection</p>
    </div>
  </div>
</footer>

</body>
</html>
